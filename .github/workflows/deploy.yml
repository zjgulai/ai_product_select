name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-smoke:
    name: Build & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npx vite build --base=/ai_product_select/
        env:
          NODE_ENV: production
          VITE_USE_MOCK_DATA: "true"

      - name: Add 404.html for SPA fallback
        run: cp dist/public/index.html dist/public/404.html

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests (block deploy on console errors)
        run: npx playwright test --config=smoke.config.ts
        env:
          CI: true

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/public
          retention-days: 1

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-smoke
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist/public

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/public
          force_orphan: true
